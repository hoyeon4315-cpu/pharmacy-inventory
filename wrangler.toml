# 약제부 재고관리 시스템 - Cloudflare Pages 설정
# 배포: wrangler pages deploy public
# 로컬 테스트: wrangler pages dev public

name = "pharmacy-inventory"
pages_build_output_dir = "public"
compatibility_date = "2024-12-01"

# D1 데이터베이스 바인딩
# 아래 database_id는 `wrangler d1 create pharmacy-db` 실행 후 출력되는 값으로 교체
[[d1_databases]]
binding = "DB"
database_name = "pharmacy-db"
database_id = "585b0acc-7821-4e8b-ab7a-ac9ee8f99d1e"

# KV - 뉴스 캐시
[[kv_namespaces]]
binding = "NEWS_CACHE"
id = "ba4027ed612d44339f49997fe40888e9"

# Workers AI
[ai]
binding = "AI"

# xAI API 키 (선택사항 - Workers AI 실패 시 폴백)
# wrangler pages secret put XAI_API_KEY 로 설정
# [vars]
# XAI_API_KEY = "" # 실제 키는 secret으로 관리
